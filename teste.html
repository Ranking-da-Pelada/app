<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETA | Ranking da Pelada 2026</title>
    <link rel="icon" type="image/png" href="/app/icone.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: radial-gradient(circle at top left, #1a1c2c, #0a0b10); color: #f8fafc; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .tab-btn { position: relative; transition: 0.3s; }
        .tab-btn.active { color: #10b981; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 25%; width: 50%; height: 2px; background: #10b981; border-radius: 2px; }
        .hidden { display: none; }
        .pos-badge { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin: 0 auto; border-radius: 50%; font-size: 11px; font-weight: 900; }
        .pos-1 { border: 1.5px solid #fbbf24; color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .pos-2 { border: 1.5px solid #94a3b8; color: #f1f5f9; background: rgba(148, 163, 184, 0.1); }
        .pos-3 { border: 1.5px solid #92400e; color: #f97316; background: rgba(146, 64, 14, 0.1); }
        @media (max-width: 640px) {
            .table-compact th, .table-compact td { padding: 0.4rem 0.15rem !important; font-size: 0.65rem !important; }
            .player-name { max-width: 85px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        }
    </style>
</head>
<body class="pb-10">
    <header class="fixed top-0 left-0 w-full glass z-50 border-b border-white/10">
        <div class="p-3 flex justify-between items-center max-w-6xl mx-auto">
            <h1 class="text-sm font-black tracking-tighter uppercase text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400">Ranking 2026</h1>
            <div id="total-partidas-liga" class="text-xs font-black text-emerald-400 bg-emerald-500/10 px-2 py-0.5 rounded-full">0 Jogos</div>
        </div>
        <nav class="flex justify-around max-w-6xl mx-auto">
            <button onclick="trocarAba('ranking')" id="btn-ranking" class="tab-btn active flex-1 py-3 text-[10px] font-black uppercase tracking-widest">Ranking</button>
            <button onclick="trocarAba('partidas')" id="btn-partidas" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase tracking-widest text-slate-500">Partidas</button>
            <button onclick="trocarAba('simulador')" id="btn-simulador" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase tracking-widest text-slate-500">Simulador</button>
        </div>
    </header>

    <main class="mt-28 max-w-6xl mx-auto px-2">
        
        <section id="aba-ranking">
            <div class="glass rounded-xl overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse table-compact">
                    <thead>
                        <tr class="text-slate-500 text-[8px] uppercase tracking-tighter border-b border-white/5 bg-white/5">
                            <th class="py-3 px-2 w-8 text-center">#</th>
                            <th class="py-3 pl-2">Jogador</th>
                            <th class="text-center w-8" onclick="ordenar('saldo')">S</th>
                            <th class="text-center w-6" onclick="ordenar('v')">V</th>
                            <th class="text-center w-6" onclick="ordenar('d')">D</th>
                            <th class="text-center w-6" onclick="ordenar('totalJ')">P</th>
                            <th class="text-center w-10" onclick="ordenar('aprov')">%</th>
                            <th class="py-3 pr-4 text-right w-20">Forma</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-body" class="divide-y divide-white/5 text-[10px] md:text-sm"></tbody>
                </table>
            </div>
        </section>

        <section id="aba-partidas" class="hidden space-y-3">
            <div id="historico-lista" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </section>

        <section id="aba-simulador" class="hidden">
            <div class="glass p-4 rounded-xl border-yellow-500/20 space-y-4 mb-6">
                <h3 class="text-[10px] font-black uppercase text-yellow-500 flex items-center gap-2"><i data-lucide="flask-conical" class="w-3 h-3"></i> Testar Resultado</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[7px] font-black text-slate-500 uppercase mb-1 block">Vencedor (Branco)</label>
                        <div id="sim-branco-tags" class="flex flex-wrap gap-1 mb-2"></div>
                        <select onchange="addSim('branco', this)" class="w-full bg-black/20 border border-white/10 rounded-lg p-2 text-[10px] outline-none">
                            <option value="">+ Adicionar</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[7px] font-black text-slate-500 uppercase mb-1 block">Derrotado (Preto)</label>
                        <div id="sim-preto-tags" class="flex flex-wrap gap-1 mb-2"></div>
                        <select onchange="addSim('preto', this)" class="w-full bg-black/20 border border-white/10 rounded-lg p-2 text-[10px] outline-none">
                            <option value="">+ Adicionar</option>
                        </select>
                    </div>
                </div>
                <div class="flex gap-2">
                    <button onclick="executarSimulacao()" class="flex-1 bg-yellow-600 text-black font-black text-[10px] py-3 rounded-lg uppercase tracking-tighter">Simular Tabela</button>
                    <button onclick="resetarSimulacao()" class="px-4 bg-slate-800 text-slate-400 font-black text-[10px] rounded-lg uppercase">Reset</button>
                </div>
            </div>
            <div id="container-resultado-sim" class="hidden">
                <h4 class="text-[8px] font-black uppercase text-slate-500 ml-1 mb-2">Tabela Projetada</h4>
                <div class="glass rounded-xl overflow-hidden border border-yellow-500/30">
                    <table class="w-full text-[10px] table-compact">
                        <tbody id="tabela-simulada-body" class="divide-y divide-white/5"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAN-K0QORHude3h_WQ8TrLBiA2VyuV04rY",
            authDomain: "ranking-pelada-2026.firebaseapp.com",
            projectId: "ranking-pelada-2026",
            storageBucket: "ranking-pelada-2026.firebasestorage.app",
            messagingSenderId: "893456950171",
            appId: "1:893456950171:web:a256af4e982bfc9c8a373e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosJogadores = [];
        let todasAsPartidas = [];
        let simBranco = [];
        let simPreto = [];
        let ordenacaoAtual = { campo: 'saldo', crescente: false };

        async function carregarDados() {
            try {
                const pSnap = await getDocs(query(collection(db, "partidas"), orderBy("timestamp", "desc")));
                todasAsPartidas = [];
                pSnap.forEach(d => todasAsPartidas.push({id: d.id, ...d.data()}));
                document.getElementById('total-partidas-liga').textContent = `${todasAsPartidas.length} Jogos`;

                const jSnap = await getDocs(collection(db, "jogadores"));
                dadosJogadores = [];
                jSnap.forEach(d => {
                    const j = d.data();
                    const jId = d.id;
                    let histForma = [];
                    let pj = 0;
                    for (let p of todasAsPartidas) {
                        const noBranco = p.branco.includes(jId);
                        const noPreto = p.preto.includes(jId);
                        if (noBranco || noPreto) {
                            pj++;
                            if (histForma.length < 5) {
                                if (p.modo === 'amistoso') histForma.push('a');
                                else histForma.push(((noBranco && p.vencedor === 'branco') || (noPreto && p.vencedor === 'preto')) ? 'v' : 'd');
                            }
                        }
                    }
                    const v = j.v || 0;
                    let streakValue = 0;
                    for(let i=0; i<histForma.length; i++) {
                        if(histForma[i] === 'v') streakValue += Math.pow(2, 5-i);
                    }
                    dadosJogadores.push({ ...j, id: jId, v, d: j.d || 0, saldo: j.saldo || 0, totalJ: pj, aprov: pj > 0 ? Math.round((v / pj) * 100) : 0, hist: [...histForma].reverse(), rawHist: histForma, streakValue });
                });

                renderizarRanking(dadosJogadores, 'tabela-body');
                renderizarHistorico();
                popularSelects();
            } catch (err) { console.error(err); }
        }

        function renderizarRanking(lista, containerId, comparativo = null) {
            const tbody = document.getElementById(containerId);
            const filtrados = lista.filter(j => j.visivel !== false);
            const mult = ordenacaoAtual.crescente ? 1 : -1;

            filtrados.sort((a, b) => {
                const c = ordenacaoAtual.campo;
                let res = (a[c] - b[c]);
                if (res === 0) res = (a.saldo - b.saldo) || (a.v - b.v) || (a.streakValue - b.streakValue);
                return res * mult || a.nome.localeCompare(b.nome);
            });

            tbody.innerHTML = '';
            filtrados.forEach((j, i) => {
                const pos = i + 1;
                const formatSaldo = j.saldo > 0 ? `+${j.saldo}` : j.saldo;
                const corSaldo = j.saldo > 0 ? "text-emerald-400" : (j.saldo < 0 ? "text-red-400" : "text-slate-500");
                
                // Lógica de setinhas para o simulador
                let seta = '';
                if(comparativo) {
                    const posAntiga = comparativo.findIndex(x => x.id === j.id) + 1;
                    if(pos < posAntiga) seta = `<span class="text-emerald-500 ml-1 text-[8px]">↑</span>`;
                    else if(pos > posAntiga) seta = `<span class="text-red-500 ml-1 text-[8px]">↓</span>`;
                }

                let bolinhas = "";
                for(let k = 0; k < 5; k++) {
                    const res = j.hist[k];
                    const cor = res === 'v' ? 'bg-emerald-500' : (res === 'd' ? 'bg-red-600' : (res === 'a' ? 'bg-slate-500' : 'bg-white/5'));
                    bolinhas += `<span class="w-1.5 h-1.5 rounded-full ${cor}"></span>`;
                }

                tbody.innerHTML += `
                    <tr class="border-b border-white/[0.02]">
                        <td class="py-3 text-center font-black">
                            ${pos <= 3 ? `<span class="pos-badge pos-${pos}">${pos}</span>` : `<span class="pos-other">${pos}</span>`}
                        </td>
                        <td class="py-3 pl-2">
                            <div class="flex items-center gap-1.5">
                                <span class="font-bold uppercase player-name text-slate-200">${j.nome}</span>
                                ${seta}
                            </div>
                        </td>
                        <td class="text-center font-mono font-bold ${corSaldo}">${formatSaldo}</td>
                        <td class="text-center font-mono text-slate-300">${j.v}</td>
                        <td class="text-center font-mono text-slate-300">${j.d}</td>
                        <td class="text-center font-mono text-slate-300">${j.totalJ}</td>
                        <td class="text-center font-mono text-slate-400">${j.aprov}%</td>
                        <td class="py-3 pr-4 text-right"><div class="flex justify-end gap-0.5">${bolinhas}</div></td>
                    </tr>`;
            });
        }

        function renderizarHistorico() {
            const container = document.getElementById('historico-lista');
            container.innerHTML = todasAsPartidas.map(p => {
                const nomesB = p.branco.map(id => dadosJogadores.find(j => j.id === id)?.nome || "---");
                const nomesP = p.preto.map(id => dadosJogadores.find(j => j.id === id)?.nome || "---");
                return `
                    <div class="glass p-3 rounded-lg border border-white/5">
                        <div class="flex justify-between items-center mb-2 text-[8px] font-black uppercase text-slate-500 border-b border-white/5 pb-1.5">
                            <span>${p.data.split('-').reverse().join('/')}</span>
                            <span class="text-emerald-500/50 italic">${p.modo}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-3 text-[9px]">
                            <div><p class="text-[7px] text-slate-500 uppercase mb-0.5">Branco</p><p class="text-slate-300 leading-tight">${nomesB.join(', ')}</p></div>
                            <div class="border-l border-white/5 pl-2.5"><p class="text-[7px] text-slate-500 uppercase mb-0.5">Preto</p><p class="text-slate-300 leading-tight">${nomesP.join(', ')}</p></div>
                        </div>
                        <div class="mt-2 pt-1.5 border-t border-white/5 text-[8px] font-black uppercase ${p.vencedor === 'branco' ? 'text-emerald-400' : 'text-cyan-400'}">
                            Vencedor: ${p.vencedor}
                        </div>
                    </div>`;
            }).join('');
        }

        // LOGICA SIMULADOR
        window.addSim = (time, select) => {
            const id = select.value; if(!id) return;
            if(time === 'branco') simBranco.push(id); else simPreto.push(id);
            renderTags(); select.value = '';
        };

        function renderTags() {
            const fn = (t, elId) => {
                document.getElementById(elId).innerHTML = (t === 'branco' ? simBranco : simPreto).map(id => `
                    <span class="bg-white/10 px-2 py-1 rounded text-[8px] font-bold uppercase flex items-center gap-1">
                        ${dadosJogadores.find(j => j.id === id)?.nome}
                        <button onclick="removeSim('${t}', '${id}')" class="text-red-400">×</button>
                    </span>`).join('');
            };
            fn('branco', 'sim-branco-tags'); fn('preto', 'sim-preto-tags');
        }

        window.removeSim = (t, id) => {
            if(t === 'branco') simBranco = simBranco.filter(x => x !== id);
            else simPreto = simPreto.filter(x => x !== id);
            renderTags();
        };

        window.executarSimulacao = () => {
            if(!simBranco.length || !simPreto.length) return alert("Escolha os times!");
            const copia = JSON.parse(JSON.stringify(dadosJogadores));
            copia.forEach(j => {
                if(simBranco.includes(j.id)) { j.v++; j.saldo++; j.totalJ++; j.hist.push('v'); j.hist.shift(); }
                if(simPreto.includes(j.id)) { j.d++; j.saldo--; j.totalJ++; j.hist.push('d'); j.hist.shift(); }
                j.aprov = Math.round((j.v / j.totalJ) * 100);
            });
            document.getElementById('container-resultado-sim').classList.remove('hidden');
            
            // Pega a lista original ordenada para comparar posições
            const originalOrdenada = [...dadosJogadores].filter(j => j.visivel !== false).sort((a,b) => {
                const c = ordenacaoAtual.campo;
                return (a[c] - b[c]) * -1 || a.nome.localeCompare(b.nome);
            });

            renderizarRanking(copia, 'tabela-simulada-body', originalOrdenada);
        };

        window.resetarSimulacao = () => {
            simBranco = []; simPreto = []; renderTags();
            document.getElementById('container-resultado-sim').classList.add('hidden');
        };

        function popularSelects() {
            const html = dadosJogadores.filter(j => j.visivel !== false).sort((a,b) => a.nome.localeCompare(b.nome)).map(j => `<option value="${j.id}">${j.nome}</option>`).join('');
            document.querySelectorAll('#aba-simulador select').forEach(s => s.innerHTML += html);
        }

        window.trocarAba = (nome) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('aba-' + nome).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.remove('active', 'text-emerald-500');
                b.classList.add('text-slate-500');
            });
            const btn = document.getElementById('btn-' + nome);
            btn.classList.add('active', 'text-emerald-500');
            btn.classList.remove('text-slate-500');
            lucide.createIcons();
        };

        window.ordenar = (campo) => {
            if (ordenacaoAtual.campo === campo) ordenacaoAtual.crescente = !ordenacaoAtual.crescente;
            else { ordenacaoAtual.campo = campo; ordenacaoAtual.crescente = false; }
            renderizarRanking(dadosJogadores, 'tabela-body');
        };

        carregarDados();
        lucide.createIcons();
    </script>
</body>
</html>
