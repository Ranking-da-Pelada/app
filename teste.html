<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BETA | Ranking da Pelada 2026</title>
    <link rel="icon" type="image/png" href="/app/icone.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            background: #0f172a; 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            padding-top: 140px; 
            overflow-x: hidden;
        }
        
        .glass { 
            background: rgba(30, 41, 59, 0.8); 
            backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }

        .tab-btn { position: relative; transition: 0.3s; color: #94a3b8; }
        .tab-btn.active { color: #ffffff; font-weight: 900; }
        .tab-btn.active::after { 
            content: ''; position: absolute; bottom: 0; left: 20%; width: 60%; height: 3px; 
            background: #ffffff; border-radius: 2px;
        }

        .hidden { display: none; }

        .pos-badge { display: flex; align-items: center; justify-content: center; width: 22px; height: 22px; margin: 0 auto; border-radius: 50%; font-size: 10px; font-weight: 900; }
        .pos-1 { border: 1.5px solid #fbbf24; color: #fbbf24; background: rgba(251, 191, 36, 0.1); }
        .pos-2 { border: 1.5px solid #cbd5e1; color: #f1f5f9; background: rgba(203, 213, 225, 0.1); }
        .pos-3 { border: 1.5px solid #d97706; color: #f59e0b; background: rgba(217, 119, 6, 0.1); }
        .pos-other { color: #f8fafc; font-weight: 800; font-size: 10px; }

        .th-active { color: #ffffff !important; font-weight: 900; }
        .cursor-pointer { cursor: pointer; white-space: nowrap; }

        @media (max-width: 640px) {
            body { padding-top: 130px; }
            .table-compact th, .table-compact td { padding: 0.6rem 0.2rem !important; font-size: 0.75rem !important; }
            .player-name { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #f8fafc; }
            .titulo-main { font-size: 1.15rem !important; }
        }
    </style>
</head>
<body class="pb-10">
    <header class="fixed top-0 left-0 w-full glass z-50 border-b border-white/10">
        <div class="p-3 md:p-4 max-w-6xl mx-auto">
            <div class="flex justify-between items-start mb-2">
                <div class="flex flex-col">
                    <h1 class="titulo-main text-lg md:text-2xl font-black tracking-tighter uppercase leading-none">
                        <span class="text-white">Ranking da Pelada</span> ⚽<span>🍻</span>
                    </h1>
                    <div class="text-slate-300 text-[10px] font-black uppercase tracking-[0.2em] mt-1.5">Temporada 2026</div>
                </div>
                
                <div class="flex items-center gap-1.5 bg-white/10 px-2.5 py-1.5 rounded-lg border border-white/10 shrink-0">
                    <p class="text-[10px] text-slate-300 uppercase font-black">Partidas:</p>
                    <p id="total-partidas-liga" class="text-[10px] font-black text-white">0</p>
                </div>
            </div>
            
            <div id="info-ultima-partida" class="text-slate-300 text-[10px] uppercase tracking-widest font-black flex items-center gap-1.5 mt-1">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> 
                Última Partida: <span id="data-ultima" class="text-white">--/--/----</span>
            </div>
        </div>

        <nav class="flex justify-around max-w-6xl mx-auto border-t border-white/5 bg-slate-900/80">
            <button onclick="trocarAba('ranking')" id="btn-ranking" class="tab-btn active flex-1 py-3 text-[10px] font-black uppercase tracking-widest">Ranking</button>
            <button onclick="trocarAba('partidas')" id="btn-partidas" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase tracking-widest">Partidas</button>
            <button onclick="trocarAba('simulador')" id="btn-simulador" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase tracking-widest">Simulador</button>
        </nav>
    </header>

    <main id="swipe-container" class="max-w-6xl mx-auto px-2 min-h-[60vh]">
        <section id="aba-ranking">
            <div class="glass rounded-xl overflow-hidden shadow-2xl">
                <table class="w-full text-left border-collapse table-compact">
                    <thead>
                        <tr class="text-slate-400 text-[8px] uppercase tracking-wider border-b border-white/5 bg-black/30">
                            <th class="py-3 px-2 w-8 text-center">#</th>
                            <th class="py-3 pl-2">Jogador</th>
                            <th class="text-center w-10 cursor-pointer hover:text-white" onclick="ordenar('saldo')">S</th>
                            <th class="text-center w-8 cursor-pointer hover:text-white" onclick="ordenar('v')">V</th>
                            <th class="text-center w-8 cursor-pointer hover:text-white" onclick="ordenar('d')">D</th>
                            <th class="text-center w-8 cursor-pointer hover:text-white" onclick="ordenar('totalJ')">P</th>
                            <th class="text-center w-10 cursor-pointer hover:text-white" onclick="ordenar('aprov')">%</th>
                            <th class="text-center w-12 cursor-pointer hover:text-white" onclick="ordenar('recentes')">REC</th>
                            <th class="py-3 pr-4 text-right w-20">Recentes</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-body" class="divide-y divide-white/[0.05] text-[10px] md:text-sm"></tbody>
                </table>
            </div>
        </section>

        <section id="aba-partidas" class="hidden space-y-3">
            <div id="historico-lista" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
        </section>

        <section id="aba-simulador" class="hidden">
            <div class="glass p-4 rounded-xl border-white/10 space-y-5 mb-6">
                <h3 class="text-[10px] font-black uppercase text-slate-100 flex items-center gap-2"><i data-lucide="flask-conical" class="w-3 h-3 text-emerald-400"></i> Cenário de Teste</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[9px] font-black text-slate-100 uppercase mb-1 block">Time Branco:</label>
                        <div id="sim-branco-tags" class="flex flex-wrap gap-1 mb-2"></div>
                        <select onchange="addSim('branco', this)" class="w-full bg-slate-900 border border-white/10 rounded-lg p-2 text-[10px] text-white"><option value="">Jogador</option></select>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-100 uppercase mb-1 block">Time Preto:</label>
                        <div id="sim-preto-tags" class="flex flex-wrap gap-1 mb-2"></div>
                        <select onchange="addSim('preto', this)" class="w-full bg-slate-900 border border-white/10 rounded-lg p-2 text-[10px] text-white"><option value="">Jogador</option></select>
                    </div>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-100 uppercase mb-1 block">Vencedor:</label>
                    <select id="sim-vencedor" class="w-full bg-slate-900 border border-white/10 rounded-lg p-2 text-[10px] text-white font-bold outline-none cursor-pointer">
                        <option value="">Time</option>
                        <option value="branco">Time Branco</option>
                        <option value="preto">Time Preto</option>
                    </select>
                </div>
                <div class="flex gap-2">
                    <button onclick="executarSimulacao()" class="flex-1 bg-emerald-600 text-white font-black text-[10px] py-3 rounded-lg uppercase tracking-widest shadow-lg">Simular</button>
                    <button onclick="resetarSimulacao()" class="px-4 bg-white/5 text-slate-400 font-black text-[10px] rounded-lg uppercase border border-white/10">Limpar</button>
                </div>
            </div>
            <div id="container-resultado-sim" class="hidden">
                <div class="glass rounded-xl overflow-hidden border border-emerald-500/30">
                    <table class="w-full text-[10px] table-compact"><tbody id="tabela-simulada-body" class="divide-y divide-white/[0.05]"></tbody></table>
                </div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAN-K0QORHude3h_WQ8TrLBiA2VyuV04rY",
            authDomain: "ranking-pelada-2026.firebaseapp.com",
            projectId: "ranking-pelada-2026",
            storageBucket: "ranking-pelada-2026.firebasestorage.app",
            messagingSenderId: "893456950171",
            appId: "1:893456950171:web:a256af4e982bfc9c8a373e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let dadosJogadores = [];
        let todasAsPartidas = [];
        let simBranco = [];
        let simPreto = [];
        let ordenacaoAtual = { campo: 'saldo', crescente: false };
        let abaAtualIndex = 0;
        const abas = ['ranking', 'partidas', 'simulador'];

        async function carregarDados() {
            try {
                const pSnap = await getDocs(query(collection(db, "partidas"), orderBy("timestamp", "desc")));
                todasAsPartidas = [];
                pSnap.forEach(d => todasAsPartidas.push({id: d.id, ...d.data()}));
                
                document.getElementById('total-partidas-liga').textContent = todasAsPartidas.length;
                if(todasAsPartidas.length > 0) {
                    const dataFormatada = todasAsPartidas[0].data.split('-').reverse().join('/');
                    document.getElementById('data-ultima').textContent = dataFormatada;
                }

                const jSnap = await getDocs(collection(db, "jogadores"));
                dadosJogadores = [];
                jSnap.forEach(d => {
                    const j = d.data();
                    let histForma = [];
                    let invict = 0, jejum = 0, countingInvict = true, countingJejum = true;
                    
                    for (let p of todasAsPartidas) {
                        const noBranco = p.branco.includes(d.id), noPreto = p.preto.includes(d.id);
                        if (noBranco || noPreto) {
                            const ganhou = ((noBranco && p.vencedor === 'branco') || (noPreto && p.vencedor === 'preto'));
                            const amistoso = p.modo === 'amistoso';

                            if (histForma.length < 5) {
                                histForma.push(amistoso ? 'a' : (ganhou ? 'v' : 'd'));
                            }

                            if(!amistoso) {
                                if(ganhou) { countingJejum = false; if(countingInvict) invict++; }
                                else { countingInvict = false; if(countingJejum) jejum++; }
                            }
                        }
                    }
                    
                    const vit5 = histForma.filter(x => x === 'v').length;
                    const totalJ = (j.v || 0) + (j.d || 0);
                    dadosJogadores.push({ 
                        ...j, id: d.id, v: j.v || 0, d: j.d || 0, saldo: j.saldo || 0, 
                        totalJ: totalJ, recentes: vit5, invict, jejum,
                        aprov: totalJ > 0 ? (j.v || 0) / totalJ : 0,
                        hist: [...histForma].reverse() 
                    });
                });

                atualizarIndicadoresVisuais();
                renderizarRanking(dadosJogadores, 'tabela-body');
                renderizarHistorico();
                popularSelects();
            } catch (err) { console.error(err); }
        }

        function atualizarIndicadoresVisuais() {
            const mapeamento = { 'saldo': 'S', 'v': 'V', 'd': 'D', 'totalJ': 'P', 'aprov': '%', 'recentes': 'REC' };
            Object.keys(mapeamento).forEach(c => {
                const th = document.querySelector(`th[onclick="ordenar('${c}')"]`);
                if (th) {
                    const seta = c === ordenacaoAtual.campo ? (ordenacaoAtual.crescente ? '↑' : '↓') : '';
                    th.innerText = mapeamento[c] + seta;
                    c === ordenacaoAtual.campo ? th.classList.add('th-active') : th.classList.remove('th-active');
                }
            });
        }

        window.ordenar = (campo) => {
            if (ordenacaoAtual.campo === campo) ordenacaoAtual.crescente = !ordenacaoAtual.crescente;
            else { ordenacaoAtual.campo = campo; ordenacaoAtual.crescente = false; }
            atualizarIndicadoresVisuais();
            renderizarRanking(dadosJogadores, 'tabela-body');
        };

        function renderizarRanking(lista, containerId, comparativo = null) {
            const tbody = document.getElementById(containerId);
            const filtrados = lista.filter(j => j.visivel !== false);
            const isCres = ordenacaoAtual.crescente;

            filtrados.sort((a, b) => {
                const c = ordenacaoAtual.campo;
                let crit = [];

                if (c === 'saldo') {
                    crit = isCres ? [a.saldo - b.saldo, a.v - b.v, a.recentes - b.recentes, b.jejum - a.jejum] 
                                  : [b.saldo - a.saldo, b.v - a.v, b.recentes - a.recentes, b.invict - a.invict];
                } else if (c === 'v') {
                    crit = isCres ? [a.v - b.v, a.saldo - b.saldo, a.recentes - b.recentes, b.jejum - a.jejum]
                                  : [b.v - a.v, b.saldo - a.saldo, b.recentes - a.recentes, b.invict - a.invict];
                } else if (c === 'd') {
                    crit = isCres ? [a.d - b.d, b.saldo - a.saldo, b.recentes - a.recentes, b.invict - a.invict]
                                  : [b.d - a.d, a.saldo - b.saldo, a.recentes - b.recentes, b.jejum - a.jejum];
                } else if (c === 'totalJ') {
                    crit = isCres ? [a.totalJ - b.totalJ, a.saldo - b.saldo, a.recentes - b.recentes, b.jejum - a.jejum]
                                  : [b.totalJ - a.totalJ, b.saldo - a.saldo, b.recentes - a.recentes, b.invict - a.invict];
                } else if (c === 'aprov') {
                    crit = isCres ? [a.aprov - b.aprov, a.saldo - b.saldo, a.recentes - b.recentes, b.jejum - a.jejum]
                                  : [b.aprov - a.aprov, b.saldo - a.saldo, b.recentes - a.recentes, b.invict - a.invict];
                } else if (c === 'recentes') {
                    crit = isCres ? [a.recentes - b.recentes, b.jejum - a.jejum, a.saldo - b.saldo, a.v - b.v]
                                  : [b.recentes - a.recentes, b.invict - a.invict, b.saldo - a.saldo, b.v - a.v];
                }

                for (let res of crit) { if (res !== 0) return res; }
                return isCres ? b.nome.localeCompare(a.nome) : a.nome.localeCompare(b.nome);
            });

            tbody.innerHTML = filtrados.map((j, i) => {
                const pos = i + 1;
                const corSaldo = j.saldo > 0 ? "text-emerald-400 font-black" : (j.saldo < 0 ? "text-red-500 font-black" : "text-slate-400");
                let setaMov = '';
                if(comparativo) {
                    const posAntiga = comparativo.findIndex(x => x.id === j.id) + 1;
                    if(pos < posAntiga) setaMov = `<span class="text-emerald-400 ml-1 text-[8px] font-black">↑</span>`;
                    else if(pos > posAntiga) setaMov = `<span class="text-red-500 ml-1 text-[8px] font-black">↓</span>`;
                }

                let bolinhas = j.hist.concat(Array(5).fill('')).slice(0,5).map(res => {
                    const cor = res === 'v' ? 'bg-emerald-500' : (res === 'd' ? 'bg-red-600' : (res === 'a' ? 'bg-slate-500' : 'bg-white/5'));
                    return `<span class="w-1.5 h-1.5 rounded-full ${cor}"></span>`;
                }).join('');

                return `
                    <tr class="border-b border-white/[0.02] hover:bg-white/[0.03]">
                        <td class="py-3 text-center">${pos <= 3 ? `<span class="pos-badge pos-${pos}">${pos}</span>` : `<span class="pos-other">${pos}</span>`}</td>
                        <td class="py-3 pl-2"><div class="flex items-center gap-1.5"><span class="font-black uppercase player-name tracking-tighter text-slate-100">${j.nome}</span>${setaMov}</div></td>
                        <td class="text-center font-mono text-[11px] ${corSaldo}">${j.saldo > 0 ? '+'+j.saldo : j.saldo}</td>
                        <td class="text-center font-mono text-slate-200 text-[10px] font-bold">${j.v}</td>
                        <td class="text-center font-mono text-slate-200 text-[10px] font-bold">${j.d}</td>
                        <td class="text-center font-mono text-slate-200 text-[10px] font-bold">${j.totalJ}</td>
                        <td class="text-center font-mono text-slate-400 text-[9px] font-bold">${Math.round(j.aprov * 100)}%</td>
                        <td class="text-center font-mono text-slate-400 text-[9px] font-black">${j.recentes}</td>
                        <td class="py-3 pr-4 text-right"><div class="flex justify-end gap-0.5">${bolinhas}</div></td>
                    </tr>`;
            }).join('');
        }

        function renderizarHistorico() {
            const container = document.getElementById('historico-lista');
            container.innerHTML = todasAsPartidas.map((p, index) => {
                const nomesB = p.branco.map(id => dadosJogadores.find(j => j.id === id)?.nome || "---");
                const nomesP = p.preto.map(id => dadosJogadores.find(j => j.id === id)?.nome || "---");
                return `
                    <div class="glass overflow-hidden rounded-xl border border-white/5 shadow-2xl">
                        <div class="bg-black/30 px-3 py-2 flex justify-between items-center border-b border-white/10">
                            <span class="text-[9px] font-black text-slate-200 uppercase tracking-widest">${p.data.split('-').reverse().join('/')} - Rodada ${todasAsPartidas.length - index}</span>
                            <span class="text-[8px] font-black px-1.5 py-0.5 rounded bg-white/10 text-slate-300 uppercase italic">${p.modo}</span>
                        </div>
                        <div class="p-4 grid grid-cols-2 gap-4 relative text-center">
                            <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 bg-slate-900 border border-white/20 w-8 h-8 rounded-full flex items-center justify-center text-[10px] font-black text-white italic z-10">VS</div>
                            <div><div class="bg-white rounded-lg p-1 mb-2 text-[10px] font-black uppercase text-slate-900 tracking-widest">Branco</div><p class="text-[11px] text-slate-100 leading-relaxed font-bold">${nomesB.join('<br>')}</p></div>
                            <div><div class="bg-black rounded-lg p-1 mb-2 text-[10px] font-black uppercase text-white tracking-widest">Preto</div><p class="text-[11px] text-slate-100 leading-relaxed font-bold">${nomesP.join('<br>')}</p></div>
                        </div>
                        <div class="px-3 py-2.5 ${p.vencedor === 'branco' ? 'bg-white text-slate-900' : 'bg-black text-white'} text-center border-t border-white/10 text-[9px] font-bold uppercase tracking-[0.4em]">Vencedor: ${p.vencedor}</div>
                    </div>`;
            }).join('');
        }

        window.addSim = (t, s) => { if(s.value) { t === 'branco' ? simBranco.push(s.value) : simPreto.push(s.value); renderTags(); s.value = ''; } };
        window.removeSim = (t, id) => { t === 'branco' ? simBranco = simBranco.filter(x => x !== id) : simPreto = simPreto.filter(x => x !== id); renderTags(); };
        function renderTags() {
            const fn = (t, el) => document.getElementById(el).innerHTML = (t === 'branco' ? simBranco : simPreto).map(id => `<span class="bg-white/10 border border-white/10 px-2 py-1 rounded text-[8px] font-bold uppercase flex items-center gap-1 text-white">${dadosJogadores.find(j => j.id === id)?.nome}<button onclick="removeSim('${t}', '${id}')" class="text-red-400 font-black px-1">×</button></span>`).join('');
            fn('branco', 'sim-branco-tags'); fn('preto', 'sim-preto-tags');
        }

        window.executarSimulacao = () => {
            if(!simBranco.length || !simPreto.length) return;
            const vencedor = document.getElementById('sim-vencedor').value;
            if(!vencedor) return;
            const copia = JSON.parse(JSON.stringify(dadosJogadores));
            copia.forEach(j => {
                const noB = simBranco.includes(j.id), noP = simPreto.includes(j.id);
                if(noB || noP) {
                    const ganhou = (noB && vencedor === 'branco') || (noP && vencedor === 'preto');
                    ganhou ? (j.v++, j.saldo++, j.hist.push('v'), j.invict++) : (j.d++, j.saldo--, j.hist.push('d'), j.jejum++);
                    j.hist.shift(); j.recentes = j.hist.filter(x => x === 'v').length; 
                    j.totalJ = j.v + j.d;
                    j.aprov = j.totalJ > 0 ? j.v / j.totalJ : 0;
                }
            });
            document.getElementById('container-resultado-sim').classList.remove('hidden');
            renderizarRanking(copia, 'tabela-simulada-body', [...dadosJogadores].filter(j => j.visivel !== false).sort((a,b) => b.saldo - a.saldo));
        };

        window.resetarSimulacao = () => { simBranco = []; simPreto = []; document.getElementById('sim-vencedor').value = ""; renderTags(); document.getElementById('container-resultado-sim').classList.add('hidden'); };
        function popularSelects() {
            const h = dadosJogadores.filter(j => j.visivel !== false).sort((a,b) => a.nome.localeCompare(b.nome)).map(j => `<option value="${j.id}">${j.nome}</option>`).join('');
            document.querySelectorAll('#aba-simulador select:not(#sim-vencedor)').forEach(s => s.innerHTML = '<option value="">Jogador</option>' + h);
        }

        window.trocarAba = (n) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById('aba-' + n).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + n).classList.add('active');
            abaAtualIndex = abas.indexOf(n); window.scrollTo(0,0);
        };

        const cnt = document.getElementById('swipe-container');
        let tX = 0;
        cnt.addEventListener('touchstart', e => tX = e.changedTouches[0].screenX, {passive: true});
        cnt.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - tX;
            if (Math.abs(diff) > 80) trocarAba(abas[Math.max(0, Math.min(abas.length-1, abaAtualIndex + (diff > 0 ? -1 : 1)))]);
        }, {passive: true});

        carregarDados();
        lucide.createIcons();
    </script>
</body>
</html>
